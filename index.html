<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>SCI-FI WARZONE</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* MENU */
#menu{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:radial-gradient(#111,#000);
color:cyan;
}

button{
padding:15px 25px;
margin:10px;
background:cyan;
border:none;
font-weight:bold;
}

/* JOYSTICK */
#joystick{
position:absolute;
bottom:40px;
left:40px;
width:130px;
height:130px;
border-radius:50%;
background:rgba(0,255,255,0.1);
display:none;
}

#stick{
width:50px;
height:50px;
border-radius:50%;
background:cyan;
position:absolute;
left:40px;
top:40px;
}

/* MINIMAP */
#minimap{
position:absolute;
top:20px;
right:20px;
width:180px;
height:180px;
background:rgba(0,255,255,0.05);
border:1px solid cyan;
border-radius:10px;
}
</style>
</head>

<body>

<div id="menu">
<h1>🚀 SCI-FI WARZONE</h1>
<button onclick="startMulti()">PLAY ONLINE</button>
</div>

<div id="joystick"><div id="stick"></div></div>

<canvas id="game" width="900" height="600"></canvas>
<canvas id="minimap" width="180" height="180"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const c=document.getElementById("game");
const ctx=c.getContext("2d");

const mini=document.getElementById("minimap");
const mctx=mini.getContext("2d");

let socket;
let mySector=1;

let players={};
let bullets=[];

let player={x:500,y:500,angle:0,hp:100};
let input={x:0,y:0};

/* ===== IMAGES ===== */
const bg=new Image(); bg.src="/public/img/bg.png";
const pimg=new Image(); pimg.src="/public/img/player.png";
const bimg=new Image(); bimg.src="/public/img/bullet.png";

/* ===== START ===== */
function startMulti(){

document.getElementById("menu").style.display="none";
document.getElementById("joystick").style.display="block";
c.style.display="block";

socket=io("http://localhost:3000");

socket.on("sectorFull",()=>alert("Szektor tele!"));

socket.on("joined",(s)=>{
mySector=s;
});

socket.on("state",(d)=>{
players=d.sectors[mySector]||{};
bullets=d.bullets||[];
});

}

/* ===== SECTOR JOIN ===== */
function joinSector(s){
socket.emit("joinSector",s);
}

/* ===== JOYSTICK ===== */
const joy=document.getElementById("joystick");
const stick=document.getElementById("stick");

let drag=false,cx=0,cy=0;

joy.addEventListener("touchstart",e=>{
drag=true;
let r=joy.getBoundingClientRect();
cx=r.left+r.width/2;
cy=r.top+r.height/2;
});

joy.addEventListener("touchmove",e=>{
if(!drag)return;

let t=e.touches[0];

let dx=t.clientX-cx;
let dy=t.clientY-cy;

let d=Math.min(45,Math.hypot(dx,dy));
let a=Math.atan2(dy,dx);

dx=Math.cos(a)*d;
dy=Math.sin(a)*d;

stick.style.transform=`translate(${dx}px,${dy}px)`;

input.x=dx/45;
input.y=dy/45;

player.angle=Math.atan2(input.y,input.x);
});

joy.addEventListener("touchend",()=>{
drag=false;
input={x:0,y:0};
stick.style.transform="translate(0,0)";
});

/* ===== SHOOT ===== */
window.addEventListener("keydown",e=>{
if(e.key===" "){
socket.emit("shoot",player);
}
});

/* ===== UPDATE ===== */
function update(){

player.x+=input.x*6;
player.y+=input.y*6;

socket.emit("move",player);

}

/* ===== DRAW ===== */
function draw(){

ctx.drawImage(bg,0,0,900,600);

/* PLAYERS */
for(let id in players){
let p=players[id];
if(p.dead) continue;

ctx.save();
ctx.translate(p.x,p.y);
ctx.rotate(p.angle);

ctx.drawImage(pimg,-20,-20,40,40);

ctx.fillStyle="red";
ctx.fillRect(-20,-30,40,5);
ctx.fillStyle="lime";
ctx.fillRect(-20,-30,40*(p.hp/100),5);

ctx.restore();
}

/* BULLETS */
bullets.forEach(b=>{
if(b.sector!==mySector)return;
ctx.drawImage(bimg,b.x,b.y,10,10);
});

}

/* ===== MINIMAP ===== */
function drawMini(){

mctx.clearRect(0,0,180,180);

for(let id in players){
let p=players[id];

let x=(p.x%2000)/2000*180;
let y=(p.y%2000)/2000*180;

mctx.fillStyle=(id===socket.id)?"lime":"cyan";
mctx.beginPath();
mctx.arc(x,y,3,0,Math.PI*2);
mctx.fill();
}

mctx.strokeStyle="cyan";
mctx.strokeRect(0,0,180,180);

}

/* ===== LOOP ===== */
function loop(){
update();
draw();
drawMini();
requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
